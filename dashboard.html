<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniWRLD | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body class="dashboard-page">
    <canvas id="particle-canvas"></canvas>
    <div id="custom-cursor">❄</div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">MiniWRLD</div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="Search groups...">
            </div>
            <div class="groups-list" id="groups-list">
                <!-- Group items will be injected here -->
                <div class="group-item active" data-group="general">
                    <div class="group-icon">#</div>
                    <div class="group-info">
                        <h3>General Community</h3>
                        <p>Welcome to MiniWRLD!</p>
                    </div>
                </div>
            </div>

            <div class="user-profile">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <span id="user-name-display">User</span>
                    <button id="logout-btn">Logout</button>
                </div>
            </div>
            <div class="sidebar-footer">
                <p>&copy; 2026 FLAZH Inc</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <div class="active-group-info">
                    <h2 id="current-group-name">General Community</h2>
                    <p id="current-group-status">2,450 members online</p>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <!-- Messages will be injected here -->
                <div class="message received">
                    <div class="message-sender">Alex</div>
                    <div class="message-content">Welcome to the MiniWRLD community, everyone!</div>
                    <div class="message-time">10:42 AM</div>
                </div>
                <div class="message received">
                    <div class="message-sender">Sarah</div>
                    <div class="message-content">The new dashboard looks incredible. Love the vibe.</div>
                    <div class="message-time">10:45 AM</div>
                </div>
            </div>

            <footer class="chat-input-area">
                <form id="message-form">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
